<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Everything / Anatomy</title>
  <style>
    :root {
      --ink: #1a1510;
      --muted: #665845;
      --paper: #ead9ba;
      --panel: rgba(255, 248, 232, .84);
      --rust: #8e2118;
      --dark: #14100c;
      --line: rgba(60, 42, 24, .22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Bahnschrift", "Arial Narrow", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 70% 10%, rgba(255,255,255,.64), transparent 25%),
        linear-gradient(135deg, #f5ead6, #cdb58b);
      overflow-x: hidden;
    }
    .page {
      min-height: 100vh;
      padding: 22px clamp(14px, 3vw, 46px) 28px;
      background-image: linear-gradient(rgba(96,70,38,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(96,70,38,.06) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .brand {
      font-size: clamp(34px, 7vw, 86px);
      line-height: .86;
      letter-spacing: -.06em;
      font-weight: 900;
      text-transform: uppercase;
    }
    .brand span { color: var(--rust); }
    .back {
      color: #fff8e9;
      background: var(--dark);
      border-radius: 999px;
      padding: 10px 14px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(270px, 390px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 18px 60px rgba(45, 30, 12, .2);
      padding: 16px;
      backdrop-filter: blur(10px);
    }
    label {
      display: block;
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 900;
      margin: 12px 0 6px;
    }
    input, textarea, select, button {
      font: inherit;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 252, 243, .82);
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
    }
    textarea {
      min-height: 92px;
      resize: vertical;
      font-family: "Noto Sans SC", sans-serif;
      line-height: 1.55;
    }
    .preview {
      min-height: 160px;
      border: 1px dashed rgba(70, 45, 20, .35);
      border-radius: 16px;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--muted);
      background: rgba(255, 255, 255, .28);
    }
    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .result-card {
      margin-top: 12px;
      min-height: 120px;
      border: 1px solid var(--line);
      border-radius: 16px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: rgba(255, 255, 255, .24);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }
    .result-card img {
      width: 100%;
      display: block;
    }
    .actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 999px;
      background: var(--dark);
      color: #fff7e6;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 900;
    }
    button.secondary { background: var(--rust); }
    .status {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .status.loading {
      color: var(--rust);
      font-weight: 900;
    }
    .status.loading::after {
      content: "";
      display: inline-block;
      width: 1.5em;
      text-align: left;
      animation: loadingDots 1.2s steps(4, end) infinite;
    }
    @keyframes loadingDots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75%, 100% { content: "..."; }
    }
    .passcode-row {
      display: grid;
      grid-template-columns: minmax(120px, 180px) 1fr;
      gap: 10px;
      align-items: center;
    }
    .limit-note {
      color: var(--rust);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    .gallery {
      display: grid;
      gap: 16px;
    }
    .scroller {
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(20, 16, 12, .08);
    }
    .track {
      display: flex;
      gap: 14px;
      width: max-content;
      padding: 14px;
      animation: drift 75s linear infinite;
    }
    .track:hover { animation-play-state: paused; }
    .plate {
      width: min(78vw, 760px);
      aspect-ratio: 16 / 10;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 14px 36px rgba(40, 25, 10, .28);
      background: #d8c19c;
      cursor: zoom-in;
    }
    .hd-viewer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      padding: clamp(12px, 3vw, 34px);
      background: rgba(16, 12, 8, .82);
      backdrop-filter: blur(10px);
    }
    .hd-viewer.open {
      display: grid;
      place-items: center;
    }
    .hd-frame {
      width: min(96vw, 1380px);
      max-height: 92vh;
      display: grid;
      gap: 10px;
    }
    .hd-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: #fff8e8;
      font-weight: 900;
    }
    .hd-toolbar button {
      padding: 9px 13px;
      background: #fff8e8;
      color: var(--ink);
    }
    .hd-image {
      width: 100%;
      max-height: 86vh;
      object-fit: contain;
      border-radius: 18px;
      background: #d8c19c;
      box-shadow: 0 22px 80px rgba(0, 0, 0, .38);
    }
    @keyframes drift {
      from { transform: translateX(0); }
      to { transform: translateX(calc(-50%)); }
    }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      border: 1px solid var(--line);
      background: rgba(255, 250, 238, .76);
      color: var(--ink);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
    }
    .chip.active {
      background: var(--rust);
      color: #fff7e8;
      border-color: transparent;
    }
    .prompt-box {
      font-family: "Consolas", "Noto Sans Mono", monospace;
      font-size: 12px;
      line-height: 1.55;
      color: #332719;
      white-space: pre-wrap;
    }
    .prompt-details {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 252, 243, .62);
      padding: 9px 11px;
    }
    .prompt-details summary {
      cursor: pointer;
      color: #4a3926;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.5;
    }
    .prompt-details .prompt-box {
      margin-top: 10px;
      max-height: 330px;
      overflow: auto;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    footer {
      margin-top: 26px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    footer a { color: var(--ink); }
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; }
      .plate { width: 86vw; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="brand">3D <span>Anatomy</span></div>
      <a class="back" href="./index.html">← 3D Everything</a>
    </div>

    <section class="layout">
      <aside class="panel">
        <label>分类</label>
        <div class="chips" id="categoryChips">
          <button class="chip active" data-category="aircraft">飞机</button>
          <button class="chip" data-category="ship">轮船</button>
          <button class="chip" data-category="vehicle">车辆</button>
          <button class="chip" data-category="machine">器械</button>
        </div>

        <label for="objectName">型号说明</label>
        <input id="objectName" placeholder="例如：Mitsubishi A6M Zero / BF109 / steam engine" />

        <label for="anatomyPasscode">口令</label>
        <div class="passcode-row">
          <input id="anatomyPasscode" type="password" placeholder="ANATOMY" autocomplete="off" />
          <div class="limit-note">每IP每日3回</div>
        </div>

        <label>上传物体照片</label>
        <input id="imageInput" type="file" accept="image/*" />
        <div class="preview" id="preview">上传后显示预览</div>

        <label for="extraPrompt">补充要求</label>
        <textarea id="extraPrompt" placeholder="可选：颜色、年代、标注语言、是否需要中英双语等"></textarea>

        <div class="actions">
          <button id="btnBuildPrompt">生成预设 Prompt</button>
          <button class="secondary" id="btnSubmit">提交给 AI模型</button>
        </div>
        <div class="status" id="status">默认展示：二战名机机械解剖图。</div>
        <div class="result-card" id="resultCard">生成结果将在这里显示</div>
      </aside>

      <section class="gallery">
        <div class="scroller" aria-label="二战名机机械解剖图慢速滚动展示">
          <div class="track">
            <img class="plate" src="./assets/anatomy-light/mitsubishi-a6m-zero.webp" data-hd="./assets/anatomy/mitsubishi-a6m-zero.png" data-title="Mitsubishi A6M Zero" alt="Mitsubishi A6M Zero anatomy plate" />
            <img class="plate" src="./assets/anatomy-light/yakovlev-yak-3.webp" data-hd="./assets/anatomy/yakovlev-yak-3.png" data-title="Yakovlev Yak-3" alt="Yakovlev Yak-3 anatomy plate" />
            <img class="plate" src="./assets/anatomy-light/p-51d-mustang.webp" data-hd="./assets/anatomy/p-51d-mustang.png" data-title="P-51D Mustang" alt="P-51D Mustang anatomy plate" />
            <img class="plate" src="./assets/anatomy-light/messerschmitt-bf110.webp" data-hd="./assets/anatomy/messerschmitt-bf110.png" data-title="Messerschmitt BF110" alt="Messerschmitt BF110 anatomy plate" />
            <img class="plate" src="./assets/anatomy-light/messerschmitt-bf109.webp" data-hd="./assets/anatomy/messerschmitt-bf109.png" data-title="Messerschmitt BF109" alt="Messerschmitt BF109 anatomy plate" />
            <img class="plate" src="./assets/anatomy-light/boeing-B-29.webp" data-hd="./assets/anatomy/boeing-B-29.png" data-title="Boeing B-29" alt="Boeing B-29 anatomy plate" />
            <img class="plate" src="./assets/anatomy-light/M4 sherman.webp" data-hd="./assets/anatomy/M4 sherman.png" data-title="M4 Sherman" alt="M4 Sherman anatomy plate" />
            <img class="plate" src="./assets/anatomy-light/T-34.webp" data-hd="./assets/anatomy/T-34.png" data-title="T-34" alt="T-34 anatomy plate" />
            <img class="plate" src="./assets/anatomy-light/mitsubishi-a6m-zero.webp" data-hd="./assets/anatomy/mitsubishi-a6m-zero.png" data-title="Mitsubishi A6M Zero" alt="" />
            <img class="plate" src="./assets/anatomy-light/yakovlev-yak-3.webp" data-hd="./assets/anatomy/yakovlev-yak-3.png" data-title="Yakovlev Yak-3" alt="" />
            <img class="plate" src="./assets/anatomy-light/p-51d-mustang.webp" data-hd="./assets/anatomy/p-51d-mustang.png" data-title="P-51D Mustang" alt="" />
            <img class="plate" src="./assets/anatomy-light/messerschmitt-bf110.webp" data-hd="./assets/anatomy/messerschmitt-bf110.png" data-title="Messerschmitt BF110" alt="" />
            <img class="plate" src="./assets/anatomy-light/messerschmitt-bf109.webp" data-hd="./assets/anatomy/messerschmitt-bf109.png" data-title="Messerschmitt BF109" alt="" />
            <img class="plate" src="./assets/anatomy-light/boeing-B-29.webp" data-hd="./assets/anatomy/boeing-B-29.png" data-title="Boeing B-29" alt="" />
            <img class="plate" src="./assets/anatomy-light/M4 sherman.webp" data-hd="./assets/anatomy/M4 sherman.png" data-title="M4 Sherman" alt="" />
            <img class="plate" src="./assets/anatomy-light/T-34.webp" data-hd="./assets/anatomy/T-34.png" data-title="T-34" alt="" />
          </div>
        </div>

        <article class="panel">
          <label>当前 AI模型 预设 Prompt</label>
          <details class="prompt-details" id="promptDetails">
            <summary id="promptSummary">预设提示词摘要</summary>
            <div class="prompt-box" id="promptBox"></div>
          </details>
        </article>
      </section>
    </section>

    <div class="hd-viewer" id="hdViewer" aria-hidden="true">
      <div class="hd-frame">
        <div class="hd-toolbar">
          <span id="hdTitle">高清预览</span>
          <button id="hdClose" type="button">关闭</button>
        </div>
        <img class="hd-image" id="hdImage" alt="高清机械解剖图预览" />
      </div>
    </div>

    <footer id="terms">
      <span>© Star Style Studio</span>
      <a href="./policy.html">Policy</a>
      <a href="./privacy.html">Privacy</a>
      <span>用户需确保上传图片拥有使用权；生成图仅用于合法展示、设计和研究用途。</span>
    </footer>
  </main>

  <script>
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const objectName = document.getElementById('objectName');
    const passcode = document.getElementById('anatomyPasscode');
    const extraPrompt = document.getElementById('extraPrompt');
    const promptBox = document.getElementById('promptBox');
    const promptSummary = document.getElementById('promptSummary');
    const statusEl = document.getElementById('status');
    const resultCard = document.getElementById('resultCard');
    const btnBuildPrompt = document.getElementById('btnBuildPrompt');
    const btnSubmit = document.getElementById('btnSubmit');
    const hdViewer = document.getElementById('hdViewer');
    const hdImage = document.getElementById('hdImage');
    const hdTitle = document.getElementById('hdTitle');
    const hdClose = document.getElementById('hdClose');
    const chips = document.querySelectorAll('[data-category]');
    let category = 'aircraft';
    let imagePayload = null;
    let presetInserted = false;

    const categoryText = {
      aircraft: 'aircraft / airplane / aviation machine',
      ship: 'ship / naval vessel / marine machine',
      vehicle: 'vehicle / car / tank / transport machine',
      machine: 'mechanical device / industrial machine / instrument'
    };

    const categoryFocus = {
      aircraft: 'For aircraft, emphasize engine, cockpit, wing structure, fuselage frame, fuel tanks, landing gear, and control surfaces. Do not include weapon systems, ammunition, explosives, payload details, targeting systems, combat markings, or political symbols.',
      ship: 'For ships, emphasize hull structure, deck layout, engine room, propeller shaft, rudder, fuel system, bridge, and internal compartments.',
      vehicle: 'For vehicles, emphasize engine, drivetrain, suspension, chassis frame, fuel tank, cockpit/interior, wheels or tracks.',
      machine: 'For machines, emphasize housing, motor or power unit, gears, shafts, controls, fasteners, wiring, and internal supports.'
    };

    function buildAircraftPreset(name) {
      return [
        `Find a picture of ${name}. Rotate it to a left-front three-quarter view.`,
        'The aircraft is viewed from a left-front three-quarter angle, slightly elevated, with the camera looking down at about 30-45 degrees.',
        'Create a highly detailed military aircraft cutaway poster in the style of vintage technical aviation magazines.',
        '',
        'Use the provided aircraft photo as the main reference.',
        '',
        'Requirements:',
        '- horizontal poster layout, 1536 x 1024 aspect ratio',
        '- realistic mechanical cutaway illustration',
        '- show internal structure and components',
        '- vintage aviation infographic style',
        '- technical arrows and labels',
        '- bilingual annotations in English and Chinese',
        '- small typography acceptable',
        '- dramatic realistic lighting',
        '- slightly aged paper texture',
        '- highly detailed engine, cockpit, fuel tanks, internal framework, wing ribs, fuselage frame, landing gear, and control surfaces',
        '- professional aerospace illustration quality',
        '- educational museum-style non-operational subject; avoid tactical instructions, explosive diagrams, weapon callouts, ammunition callouts, political symbols, and combat-use diagrams',
        '',
        'Top title:',
        '"English nationality, aircraft name and type" with the aircraft name and type in dark red characters.',
        '"Chinese nationality, aircraft name and type" with the aircraft name and type in dark red characters.',
        '',
        'Small footer text:',
        '"star-style-studio.net"',
        '',
        'Style references:',
        'History Channel aircraft technical poster',
        'WW2 military cutaway illustration',
        'aviation engineering infographic',
        'retro aerospace magazine layout'
      ].join('\\n');
    }

    function buildVehiclePreset(name) {
      return [
        `Find a reference picture of ${name}, rotated to a left-front three-quarter view.`,
        'The tank or vehicle is viewed from a slightly elevated angle, with the camera looking down at about 30-45 degrees.',
        '',
        'Create a highly detailed WWII military vehicle cutaway poster in the style of vintage technical military magazines.',
        '',
        'Use the provided tank or vehicle photo as the main reference.',
        '',
        'Requirements:',
        '- horizontal poster layout, 1536 x 1024 aspect ratio',
        '- realistic mechanical cutaway illustration',
        '- show internal structure and components',
        '- vintage military engineering infographic style',
        '- technical arrows and labels',
        '- bilingual annotations in English and Chinese',
        '- small typography acceptable',
        '- dramatic realistic lighting',
        '- slightly aged paper texture',
        '- highly detailed turret or cabin, main body structure, engine, transmission, fuel tanks, crew compartment, driver seat, radio, tracks or wheels, road wheels, suspension, armor plates, chassis, and internal framework',
        '- professional military vehicle illustration quality',
        '- WWII historical atmosphere, but the vehicle should be the clear central subject',
        '- educational museum-style non-operational subject; avoid tactical instructions, firing mechanism diagrams, explosive diagrams, ammunition callouts, weapon operation labels, political symbols, and combat-use diagrams',
        '',
        'Top title:',
        '"English nationality, vehicle name and type" with the vehicle name and type in dark red characters.',
        '"Chinese nationality, vehicle name and type" with the vehicle name and type in dark red characters.',
        '',
        'Small footer text:',
        '"star-style-studio.net"',
        '',
        'Style references:',
        'WWII military cutaway illustration',
        'vintage tank technical poster',
        'History Channel military vehicle infographic',
        'retro armored vehicle magazine layout',
        'engineering blueprint poster'
      ].join('\\n');
    }

    function buildPresetPromptOnly() {
      const name = objectName.value.trim() || 'World War II aircraft';
      if (category === 'aircraft') return buildAircraftPreset(name);
      if (category === 'vehicle') return buildVehiclePreset(name);
      return [
        `Create a premium mechanical cutaway anatomy poster for: ${name}.`,
        `Object category: ${categoryText[category]}.`,
        'Purpose: educational museum-style engineering illustration of a non-operational, demilitarized object.',
        'Use the uploaded reference photo as the main visual reference.',
        'Show a detailed cutaway structure with visible internal frame, main power unit, fuel/energy system, cockpit/control unit, structural ribs, mechanical linkages, support components, and labeled parts.',
        categoryFocus[category],
        'Composition: vintage engineering poster, front 3/4 view, full object visible, centered, no cropping.',
        'Style: highly detailed technical illustration, realistic metal texture, parchment background, fine red annotation lines.',
        'Layout: large title at top left, specifications table, history box, variants/parts diagrams, clean readable labels.',
        'Labels: use short readable English and Chinese labels for structural and mechanical parts only. Avoid fake letters, unreadable text, nonsense labels, fantasy parts, distorted geometry, weapon callouts, ammunition callouts, and explosive diagrams.'
      ].filter(Boolean).join('\\n');
    }

    function buildPrompt() {
      const extra = extraPrompt.value.trim();
      if (presetInserted && extra) return extra;
      return [
        buildPresetPromptOnly(),
        extra ? `Additional user request:\\n${extra}` : ''
      ].filter(Boolean).join('\\n\\n');
    }

    function updatePrompt() {
      const preset = buildPresetPromptOnly();
      const summary = preset.replace(/\s+/g, ' ').slice(0, 180);
      promptSummary.textContent = `预设开头：${summary}${preset.length > 180 ? '...' : ''}（点击展开全文）`;
      promptBox.textContent = preset;
    }

    function setStatus(message, loading = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('loading', loading);
    }

    function formatElapsed(ms) {
      const total = Math.max(0, Math.floor(ms / 1000));
      const min = String(Math.floor(total / 60)).padStart(2, '0');
      const sec = String(total % 60).padStart(2, '0');
      return `${min}:${sec}`;
    }

    function waitingMessage(startedAt, progress = 10, pollCount = 0, phase = 'AI模型生成中') {
      const seconds = Math.floor((Date.now() - startedAt) / 1000);
      return `${phase} ${progress || 10}% / ${seconds}秒 / 查询 ${pollCount} 次。请不要重复提交或关闭页面。`;
    }

    function appendPresetPromptToExtra() {
      const preset = buildPresetPromptOnly();
      const current = extraPrompt.value.trim();
      extraPrompt.value = current ? `${current}\\n\\n${preset}` : preset;
      presetInserted = true;
      extraPrompt.focus();
      updatePrompt();
      setStatus('预设 Prompt 已追加到补充要求栏。');
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function loadImage(dataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = dataUrl;
      });
    }

    function canvasToDataUrl(canvas, quality) {
      return canvas.toDataURL('image/jpeg', quality);
    }

    async function shrinkImageToLimit(file, maxBytes = 1800 * 1024) {
      const originalDataUrl = await readFileAsDataUrl(file);
      if (file.size <= maxBytes && /^image\/jpe?g$/i.test(file.type || '')) {
        return {
          dataUrl: originalDataUrl,
          mimeType: file.type || 'image/jpeg',
          bytes: file.size,
          originalName: file.name
        };
      }

      const img = await loadImage(originalDataUrl);
      let width = img.naturalWidth;
      let height = img.naturalHeight;
      let quality = 0.88;
      let dataUrl = originalDataUrl;

      for (let i = 0; i < 10; i += 1) {
        const scale = Math.min(1, Math.sqrt(maxBytes / Math.max(file.size, 1)) * Math.pow(0.86, i));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(640, Math.round(width * scale));
        canvas.height = Math.max(640, Math.round(height * scale));
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        dataUrl = canvasToDataUrl(canvas, quality);
        const approxBytes = Math.round((dataUrl.length - dataUrl.indexOf(',') - 1) * 0.75);
        if (approxBytes <= maxBytes) {
          return {
            dataUrl,
            mimeType: 'image/jpeg',
            bytes: approxBytes,
            originalName: file.name
          };
        }
        quality = Math.max(0.55, quality - 0.08);
      }

      const approxBytes = Math.round((dataUrl.length - dataUrl.indexOf(',') - 1) * 0.75);
      return {
        dataUrl,
        mimeType: 'image/jpeg',
        bytes: approxBytes,
        originalName: file.name
      };
    }

    imageInput.addEventListener('change', async () => {
      const file = imageInput.files && imageInput.files[0];
      if (!file) return;
      setStatus('正在处理照片，自动压缩到约 1.8MB 以下', true);
      imagePayload = await shrinkImageToLimit(file);
      preview.innerHTML = `<img src="${imagePayload.dataUrl}" alt="上传照片预览">`;
      setStatus(`照片已选择：${Math.round(imagePayload.bytes / 1024)}KB`);
    });

    chips.forEach((chip) => {
      chip.addEventListener('click', () => {
        category = chip.dataset.category;
        presetInserted = false;
        chips.forEach((item) => item.classList.toggle('active', item === chip));
        updatePrompt();
      });
    });

    objectName.addEventListener('input', () => {
      presetInserted = false;
      updatePrompt();
    });
    extraPrompt.addEventListener('input', () => {
      if (!extraPrompt.value.trim()) presetInserted = false;
      updatePrompt();
    });
    btnBuildPrompt.addEventListener('click', appendPresetPromptToExtra);

    document.querySelectorAll('.plate[data-hd]').forEach((plate) => {
      plate.addEventListener('click', () => {
        hdImage.src = plate.dataset.hd;
        hdTitle.textContent = `${plate.dataset.title || '高清预览'} / PNG`;
        hdViewer.classList.add('open');
        hdViewer.setAttribute('aria-hidden', 'false');
      });
    });

    function closeHdViewer() {
      hdViewer.classList.remove('open');
      hdViewer.setAttribute('aria-hidden', 'true');
      hdImage.removeAttribute('src');
    }

    hdClose.addEventListener('click', closeHdViewer);
    hdViewer.addEventListener('click', (event) => {
      if (event.target === hdViewer) closeHdViewer();
    });
    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && hdViewer.classList.contains('open')) closeHdViewer();
    });

    async function waitForAnatomyJob(jobId, startedAt, waitInfo) {
      let softErrorCount = 0;
      let pollCount = 0;
      while (true) {
        await new Promise((resolve) => setTimeout(resolve, 5000));
        pollCount += 1;
        try {
          const response = await fetch(`/gpt-api/anatomy-jobs/${encodeURIComponent(jobId)}`, { cache: 'no-store' });
          const text = await response.text();
          let job = {};
          try { job = text ? JSON.parse(text) : {}; } catch (error) { job = {}; }
          if (!response.ok) throw new Error(job.error || job.message || text || `HTTP ${response.status}`);
          softErrorCount = 0;
          waitInfo.phase = 'AI模型生成中';
          waitInfo.progress = job.progress || 10;
          waitInfo.pollCount = pollCount;
          btnSubmit.textContent = `生成中 ${formatElapsed(Date.now() - startedAt)}`;
          setStatus(waitingMessage(startedAt, waitInfo.progress, waitInfo.pollCount, waitInfo.phase), true);
          if (job.status === 'FINISHED') return job;
          if (job.status === 'FAILED') throw new Error(job.error || 'AI模型生成失败');
        } catch (error) {
          softErrorCount += 1;
          if (softErrorCount >= 5) throw error;
          waitInfo.phase = `网络暂时不稳定，继续等待 ${softErrorCount}/5`;
          btnSubmit.textContent = `等待中 ${formatElapsed(Date.now() - startedAt)}`;
          setStatus(`状态确认中 ${formatElapsed(Date.now() - startedAt)} / ${waitInfo.phase}`, true);
        }
      }
    }

    btnSubmit.addEventListener('click', async () => {
      if (btnSubmit.disabled) return;
      if (passcode.value.trim() !== 'ANATOMY') {
        alert('请输入正确口令：ANATOMY');
        return;
      }
      if (!imagePayload) {
        alert('请先上传物体照片');
        return;
      }
      const startedAt = Date.now();
      const originalLabel = btnSubmit.textContent;
      const waitInfo = { phase: '正在提交/排队', progress: 10, pollCount: 0 };
      let heartbeat = null;
      setStatus('正在提交给 AI模型 0秒', true);
      btnSubmit.disabled = true;
      btnSubmit.textContent = '提交中 00:00';
      heartbeat = setInterval(() => {
        btnSubmit.textContent = `生成中 ${formatElapsed(Date.now() - startedAt)}`;
        setStatus(waitingMessage(startedAt, waitInfo.progress, waitInfo.pollCount, waitInfo.phase), true);
      }, 1000);
      try {
        waitInfo.phase = '正在提交给 AI模型';
        setStatus(waitingMessage(startedAt, waitInfo.progress, waitInfo.pollCount, waitInfo.phase), true);
        const response = await fetch('/gpt-api/anatomy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            passcode: 'ANATOMY',
            category,
            objectName: objectName.value.trim(),
            prompt: buildPrompt(),
            image: imagePayload
          })
        });
        const text = await response.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch (error) { data = {}; }
        if (!response.ok) {
          const cfMatch = text.match(/Error code\s*(\d{3})|<title>[^|<]*\|\s*(\d{3})/i);
          const cfCode = cfMatch ? (cfMatch[1] || cfMatch[2]) : '';
          throw new Error(data.error || (cfCode ? `Cloudflare ${cfCode}: Synology API 临时没有回应` : text.slice(0, 180) || `HTTP ${response.status}`));
        }
        waitInfo.phase = '已提交，AI模型生成中';
        waitInfo.progress = data.progress || 10;
        setStatus(waitingMessage(startedAt, waitInfo.progress, waitInfo.pollCount, waitInfo.phase), true);
        const job = data.jobId ? await waitForAnatomyJob(data.jobId, startedAt, waitInfo) : data;
        const imageUrl = job.imageUrl || job.publicImageUrl || job.url;
        if (!imageUrl) throw new Error('生成完成，但没有返回图片地址');
        resultCard.innerHTML = `<img src="${imageUrl}" alt="生成的机械解剖图">`;
        setStatus(`生成完成。总等待 ${formatElapsed(Date.now() - startedAt)}。`);
      } catch (error) {
        setStatus(`提交失败：${error.message}。已等待 ${formatElapsed(Date.now() - startedAt)}。`);
      } finally {
        if (heartbeat) clearInterval(heartbeat);
        btnSubmit.disabled = false;
        btnSubmit.textContent = originalLabel;
      }
    });

    updatePrompt();
  </script>
</body>
</html>
