<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Everything / 3D-VR</title>
  <style>
    :root {
      --ink: #111817;
      --muted: #5c6a66;
      --paper: #edf2ec;
      --panel: rgba(244, 250, 244, .84);
      --aqua: #0f7280;
      --deep: #0e1f24;
      --line: rgba(25, 56, 58, .18);
      --sky: #b9dfe8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Bahnschrift", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 78% 8%, rgba(255,255,255,.82), transparent 26%),
        radial-gradient(circle at 8% 92%, rgba(31,138,151,.24), transparent 31%),
        linear-gradient(135deg, #f5f0df 0%, #b7d9d4 52%, #6f9eaa 100%);
      overflow-x: hidden;
    }
    .page {
      min-height: 100vh;
      padding: 22px clamp(14px, 3vw, 46px) 30px;
      background-image: linear-gradient(rgba(15,80,93,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(15,80,93,.05) 1px, transparent 1px);
      background-size: 34px 34px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }
    .brand {
      font-size: clamp(42px, 9vw, 104px);
      line-height: .86;
      letter-spacing: -.07em;
      font-weight: 900;
      text-transform: uppercase;
    }
    .brand span { color: var(--aqua); }
    .back {
      color: #f5fbf8;
      background: var(--deep);
      border-radius: 999px;
      padding: 10px 14px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 390px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 20px 70px rgba(15, 40, 38, .2);
      padding: 16px;
      backdrop-filter: blur(12px);
    }
    label {
      display: block;
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 900;
      margin: 12px 0 6px;
    }
    input, textarea, button {
      font: inherit;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255, 255, 255, .72);
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
    }
    textarea {
      min-height: 96px;
      resize: vertical;
      font-family: "Noto Sans SC", sans-serif;
      line-height: 1.55;
    }
    .pass-row {
      display: grid;
      grid-template-columns: minmax(120px, 175px) 1fr;
      gap: 10px;
      align-items: center;
    }
    .note {
      color: var(--aqua);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }
    .preview {
      min-height: 150px;
      border: 1px dashed rgba(15, 80, 93, .38);
      border-radius: 18px;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--muted);
      background: rgba(255, 255, 255, .28);
      text-align: center;
    }
    .preview img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 999px;
      background: var(--deep);
      color: #f7fffb;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 900;
    }
    button.secondary { background: var(--aqua); }
    .status {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .viewer-wrap {
      display: grid;
      gap: 14px;
    }
    .viewer {
      height: min(64vh, 680px);
      min-height: 360px;
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,.42);
      box-shadow: 0 24px 80px rgba(8, 33, 36, .28);
      overflow: hidden;
      position: relative;
      background: linear-gradient(180deg, #dbeef2, #7fa9b0);
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    .viewer.dragging { cursor: grabbing; }
    .pano {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform-origin: center center;
      transition: filter .2s ease;
    }
    .viewer.empty .pano { display: none; }
    .hud {
      position: absolute;
      left: 14px;
      bottom: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      z-index: 2;
    }
    .pill {
      border-radius: 999px;
      background: rgba(8, 20, 24, .78);
      color: #eefcf7;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 900;
      backdrop-filter: blur(8px);
    }
    .empty-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      color: #244044;
      font-weight: 900;
      line-height: 1.7;
    }
    .sample-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .sample {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      min-height: 92px;
      background: rgba(255,255,255,.46);
      display: grid;
      align-content: end;
      color: #f7fffb;
      font-weight: 900;
      text-shadow: 0 2px 10px rgba(0,0,0,.38);
      overflow: hidden;
      position: relative;
    }
    .sample::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--bg);
      z-index: -1;
    }
    footer {
      margin-top: 24px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    footer a { color: var(--ink); }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .viewer { height: 56vh; min-height: 330px; }
      .sample-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="brand">3D-<span>VR</span></div>
      <a class="back" href="./index.html">← 3D Everything</a>
    </div>

    <section class="layout">
      <aside class="panel">
        <label for="spaceName">建筑 / 环境说明</label>
        <input id="spaceName" placeholder="例如：modern cafe interior / forest path / gallery lobby" />

        <label for="vrPasscode">口令</label>
        <div class="pass-row">
          <input id="vrPasscode" type="password" placeholder="3DVR" autocomplete="off" />
          <div class="note">每IP每日3回</div>
        </div>

        <label>上传建筑或环境图片</label>
        <input id="imageInput" type="file" accept="image/*" />
        <div class="preview" id="preview">上传后显示参考图片预览</div>

        <label for="extraPrompt">补充要求</label>
        <textarea id="extraPrompt" placeholder="可选：白天/夜晚、现代/复古、室内/室外、保留哪些元素、画面风格等"></textarea>

        <div class="actions">
          <button id="btnPreview">先用上传图观察</button>
          <button class="secondary" id="btnSubmit">生成360全景</button>
        </div>
        <div class="status" id="status">上传建筑或环境照片后，可先在右侧用浏览器全景观察区域试看。</div>
      </aside>

      <section class="viewer-wrap">
        <div class="viewer empty" id="viewer" aria-label="360度全景观察区">
          <img class="pano" id="panoImage" alt="360 panorama preview" />
          <div class="empty-text" id="emptyText">360 全景观察区<br>拖拽可水平旋转，滚轮或双指可缩放</div>
          <div class="hud">
            <span class="pill" id="angleText">Yaw 0°</span>
            <span class="pill" id="zoomText">Zoom 1.00x</span>
            <span class="pill">Browser VR Preview</span>
          </div>
        </div>

        <article class="panel">
          <label>推荐场景</label>
          <div class="sample-grid">
            <div class="sample" style="--bg: linear-gradient(135deg, #0f4f5d, #d7c49a);">建筑外观</div>
            <div class="sample" style="--bg: linear-gradient(135deg, #203b2e, #c7e8cf);">自然环境</div>
            <div class="sample" style="--bg: linear-gradient(135deg, #2b2a3f, #f1ddbd);">室内空间</div>
          </div>
        </article>
      </section>
    </section>

    <footer>
      <span>© Star Style Studio</span>
      <a href="./policy.html">Policy</a>
      <a href="./privacy.html">Privacy</a>
      <a href="./index.html">3D Everything</a>
    </footer>
  </main>

  <script>
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const viewer = document.getElementById('viewer');
    const panoImage = document.getElementById('panoImage');
    const emptyText = document.getElementById('emptyText');
    const angleText = document.getElementById('angleText');
    const zoomText = document.getElementById('zoomText');
    const statusEl = document.getElementById('status');
    const btnPreview = document.getElementById('btnPreview');
    const btnSubmit = document.getElementById('btnSubmit');
    const spaceName = document.getElementById('spaceName');
    const passcode = document.getElementById('vrPasscode');
    const extraPrompt = document.getElementById('extraPrompt');

    let imagePayload = null;
    let yaw = 0;
    let zoom = 1;
    let dragging = false;
    let lastX = 0;

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function loadImage(dataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = dataUrl;
      });
    }

    async function shrinkImageToLimit(file, maxBytes = 5 * 1024 * 1024) {
      const originalDataUrl = await readFileAsDataUrl(file);
      if (file.size <= maxBytes) {
        return { dataUrl: originalDataUrl, mimeType: file.type || 'image/jpeg', bytes: file.size, originalName: file.name };
      }
      const img = await loadImage(originalDataUrl);
      let dataUrl = originalDataUrl;
      let quality = 0.88;
      for (let i = 0; i < 10; i += 1) {
        const scale = Math.pow(0.84, i + 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(900, Math.round(img.naturalWidth * scale));
        canvas.height = Math.max(600, Math.round(img.naturalHeight * scale));
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        dataUrl = canvas.toDataURL('image/jpeg', quality);
        const approxBytes = Math.round((dataUrl.length - dataUrl.indexOf(',') - 1) * 0.75);
        if (approxBytes <= maxBytes) return { dataUrl, mimeType: 'image/jpeg', bytes: approxBytes, originalName: file.name };
        quality = Math.max(0.55, quality - 0.08);
      }
      const approxBytes = Math.round((dataUrl.length - dataUrl.indexOf(',') - 1) * 0.75);
      return { dataUrl, mimeType: 'image/jpeg', bytes: approxBytes, originalName: file.name };
    }

    function updateView() {
      panoImage.style.transform = `scale(${zoom}) translateX(${yaw}px)`;
      angleText.textContent = `Yaw ${Math.round((yaw / 8) % 360)}°`;
      zoomText.textContent = `Zoom ${zoom.toFixed(2)}x`;
    }

    function setPanorama(dataUrl) {
      panoImage.src = dataUrl;
      viewer.classList.remove('empty');
      emptyText.style.display = 'none';
      yaw = 0;
      zoom = 1;
      updateView();
    }

    imageInput.addEventListener('change', async () => {
      const file = imageInput.files && imageInput.files[0];
      if (!file) return;
      statusEl.textContent = '正在处理图片，必要时自动压缩到 5MB 以下...';
      imagePayload = await shrinkImageToLimit(file);
      preview.innerHTML = `<img src="${imagePayload.dataUrl}" alt="上传图片预览">`;
      statusEl.textContent = `图片已选择：${Math.round(imagePayload.bytes / 1024)}KB`;
    });

    btnPreview.addEventListener('click', () => {
      if (!imagePayload) {
        alert('请先上传建筑或环境图片');
        return;
      }
      setPanorama(imagePayload.dataUrl);
      statusEl.textContent = '已使用上传图进入全景观察区。真正360空间生成需要后端 /vr-api/panorama。';
    });

    btnSubmit.addEventListener('click', async () => {
      if (passcode.value.trim() !== '3DVR') {
        alert('请输入正确口令：3DVR');
        return;
      }
      if (!imagePayload) {
        alert('请先上传建筑或环境图片');
        return;
      }
      statusEl.textContent = '正在提交生成360全景空间...';
      try {
        const response = await fetch('/vr-api/panorama', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            passcode: '3DVR',
            spaceName: spaceName.value.trim(),
            prompt: extraPrompt.value.trim(),
            image: imagePayload
          })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
        const imageUrl = data.imageUrl || data.publicImageUrl || data.url;
        if (imageUrl) setPanorama(imageUrl);
        statusEl.textContent = '360全景生成完成。';
      } catch (error) {
        statusEl.textContent = `提交失败：${error.message}`;
      }
    });

    viewer.addEventListener('pointerdown', (event) => {
      dragging = true;
      lastX = event.clientX;
      viewer.classList.add('dragging');
      viewer.setPointerCapture(event.pointerId);
    });
    viewer.addEventListener('pointermove', (event) => {
      if (!dragging) return;
      yaw += event.clientX - lastX;
      lastX = event.clientX;
      updateView();
    });
    viewer.addEventListener('pointerup', () => {
      dragging = false;
      viewer.classList.remove('dragging');
    });
    viewer.addEventListener('wheel', (event) => {
      event.preventDefault();
      zoom = Math.min(2.4, Math.max(1, zoom - event.deltaY * 0.001));
      updateView();
    }, { passive: false });
  </script>
</body>
</html>
